name: Change Request
description: Capture initial product intent for a repo-backed change.
title: "[Change]: "
body:
  - type: markdown
    attributes:
      value: |
        Use this issue for product intent and discussion history. The PO Agent will turn accepted intent into repo-backed artifacts under `changes/<change-id>/`.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem should this change solve?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: What should be true when this is done?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How should the PO decide whether the delivered behavior is acceptable?
      value: |
        - 
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes, constraints, or tradeoffs
      description: Optional context for the PO Agent or Architect Agent. Detailed specs can be refined later in repo artifacts.
